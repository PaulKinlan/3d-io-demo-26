<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- This page is obsolete: the browser chrome is now injected into every demo
       at build/dev time by demos/_frame/wrap.js, so there is no separate wrapper
       page and no inner iframe. Kept only as a redirect for old links. -->
  <meta name="frame" content="none">
  <title>Redirecting…</title>
  <script>
    // Preserve a legacy ?url=/demos/x/ deep link by forwarding to that demo,
    // which now renders its own chrome. Otherwise go to the new-tab home page.
    const target = new URLSearchParams(location.search).get('url') || '/demos/new-tab/';
    location.replace(target);
  </script>
</head>
<body></body>
</html>
