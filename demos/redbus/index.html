<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>redBus Demo</title>
  <style>
    :root {
      --accent: #d84e55;
    }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .video-container {
      position: relative;
      width: 98vw;
      height: 50.625vw; /* 16:9 aspect ratio */
      max-width: 900px;
      max-height: 600px;
      background: #15171e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--accent);
    }
    .logo {
      height: 70px;
      margin-bottom: 24px;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <img src="redbus-logo.png" class="logo" alt="redBus">
  <div class="video-container">
    <video autoplay loop muted playsinline>
      <source src="../bengaluru-io-connect/[redBus] elementScopedVtNew1.mov" type="video/quicktime">
      <source src="../bengaluru-io-connect/[redBus] elementScopedVtNew1.mov" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
