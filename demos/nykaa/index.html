<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nykaa Demo</title>
  <style>
    :root {
      --accent: #fc2779;
    }
    body {
      margin: 0;
      padding: 0;
      background: #0d0e12;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .video-container {
      position: relative;
      width: 90vw;
      height: 50.625vw; /* 16:9 aspect ratio */
      max-width: 800px;
      max-height: 450px;
      background: #15171e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Animated background simulating video play */
    .video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a0e1b 0%, #0d0e12 50%, #1c0e2a 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      z-index: 1;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* Ambient glow */
    .glow {
      position: absolute;
      width: 150px;
      height: 150px;
      background: var(--accent);
      filter: blur(80px);
      opacity: 0.3;
      z-index: 2;
      animation: pulse 4s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(1.4); opacity: 0.4; }
    }
    .player-ui {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
      background: linear-gradient(to top, rgba(13, 14, 18, 0.95) 0%, rgba(13, 14, 18, 0) 100%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .left-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(252, 39, 121, 0.3);
    }
    .play-btn svg {
      width: 14px;
      height: 14px;
      fill: white;
      margin-left: 2px;
    }
    .title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.9);
    }
    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      animation: playProgress 15s linear infinite;
    }
    @keyframes playProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .duration {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      font-variant-numeric: tabular-nums;
    }
    .badge {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--accent);
    }
    .center-play {
      z-index: 3;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .center-play:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
    }
    .center-play svg {
      width: 24px;
      height: 24px;
      fill: var(--accent);
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="badge">Nykaa</div>
  <div class="video-container">
    <div class="video-bg"></div>
    <div class="glow"></div>
    
    <div class="center-play">
      <svg viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>

    <div class="player-ui">
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
      <div class="controls">
        <div class="left-controls">
          <div class="play-btn">
            <svg viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
          <div class="title">Nykaa Beauty & Fashion Campaign</div>
        </div>
        <div class="duration">0:03 / 1:30</div>
      </div>
    </div>
  </div>
</body>
</html>
