<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Islands - Patching Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      min-height: 100vh;
    }
    header {
      width: 100%;
      padding: 1.5rem 2rem;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #111827;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1000px;
      width: 100%;
      padding: 3rem 2rem;
      box-sizing: border-box;
    }
    .island {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }
    .island h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #111827;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 0.75rem;
      margin-bottom: 1rem;
    }
    .loading {
      color: #9ca3af;
      font-style: italic;
      margin: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>Paul Kinlan's Blog (HTML Islands)</h1>
  </header>
  
  <div class="container" id="blog-shell">
    <div class="island">
      <h2>Latest RSS Feeds</h2>
      <section contentname="rss-list">
        <div class="loading">Loading feeds...</div>
      </section>
    </div>
    
    <div class="island">
      <h2>GitHub Activity</h2>
      <section contentname="github-activity">
        <div class="loading">Loading activity...</div>
      </section>
    </div>
    
    <div class="island">
      <h2>Recent Projects</h2>
      <section contentname="projects-list">
        <div class="loading">Loading projects...</div>
      </section>
    </div>
  </div>
  
  <p style="margin-top: 2rem; color: rgba(31, 41, 55, 0.6); text-align: center;">
    Note: Access this path via the Vite dev server or run <code>node server.js</code> to see the dynamic island loading.
  </p>
</body>
</html>
