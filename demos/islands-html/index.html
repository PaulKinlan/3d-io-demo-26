<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Islands - Patching Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      min-height: 100vh;
    }
    header {
      width: 100%;
      padding: 1.5rem 2rem;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #111827;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1000px;
      width: 100%;
      padding: 3rem 2rem;
      box-sizing: border-box;
    }
    .island {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }
    .island h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #111827;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 0.75rem;
      margin-bottom: 1rem;
    }
    .loading {
      color: #9ca3af;
      font-style: italic;
      margin: auto;
    }
    .island-content ul {
      padding-left: 1.2rem;
      margin: 0;
    }
    .island-content li {
      margin-bottom: 0.5rem;
    }
    .island-content h4 {
      margin: 1rem 0 0.5rem 0;
      font-size: 0.9rem;
      color: #4b5563;
    }
    .island-content a {
      color: #2563eb;
      text-decoration: none;
    }
    .island-content a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Paul Kinlan's Blog (HTML Islands)</h1>
  </header>
  
  <div class="container" id="blog-shell">
    <div class="island" id="rss-island">
      <h2>Latest RSS Feeds</h2>
      <section>
        <?start name="rss-list"><div class="loading">Loading feeds...</div><?end>
      </section>
    </div>
    
    <div class="island" id="github-island">
      <h2>GitHub Activity</h2>
      <section>
        <?start name="github-activity"><div class="loading">Loading activity...</div><?end>
      </section>
    </div>
    
    <div class="island" id="projects-island">
      <h2>Recent Projects</h2>
      <section>
        <?start name="projects-list"><div class="loading">Loading projects...</div><?end>
      </section>
    </div>
  </div>

  <script>
    // Fetch and pipe islands to specific elements
    async function loadIsland(name, elementId) {
      const response = await fetch(`/demos/islands-html/${name}`);
      const element = document.getElementById(elementId);
      if (element) {
        await response.body
          .pipeThrough(new TextDecoderStream())
          .pipeTo(element.streamAppendHTMLUnsafe());
      }
    }

    loadIsland('rss', 'rss-island');
    loadIsland('github', 'github-island');
    loadIsland('projects', 'projects-island');
  </script>
</body>
</html>
