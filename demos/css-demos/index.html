<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="frame" content="none">
  <title>CSS Superpowers</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #ec4899;
      --accent-hover: #f472b6;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    html {
      /* Define scroll state container on the document scroller */
      container-type: scroll-state;
      container-name: document-scroller;
      background: var(--bg);
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      min-height: 200vh; /* Ensure there is scrolling */
    }

    /* --- 1. @scroll-state aware header --- */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.4s ease;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      view-transition-name: header-bar;
    }
    
    header h1 { margin: 0; font-size: 2.2rem; color: #a78bfa; transition: color 0.4s; }
    header p { margin: 0.5rem 0 0 0; color: var(--text-muted); font-size: 1.1rem; }

    @container document-scroller scroll-state(scrolled: top) {
       header {
         background: rgba(236, 72, 153, 0.15);
         border-bottom: 1px solid rgba(236, 72, 153, 0.3);
         box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
         padding: 1rem;
       }
       header h1 {
         color: var(--accent);
         font-size: 1.8rem;
       }
    }

    main {
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* --- Normal Card Layout --- */
    .card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border-color: rgba(255,255,255,0.2);
    }

    /* --- Decorative Shapes --- */
    .shape-demo {
      width: 120px;
      height: 100px;
      margin-bottom: 1.5rem;
      background: var(--accent);
      border: 3px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      /* Base clip-path for hover morphing */
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
      transition: clip-path 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.4s ease;
    }

    .shape-demo.hexagon {
      border-shape: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: #ec4899;
    }
    .shape-demo.speech-bubble {
      width: 130px;
      border-shape: polygon(0% 0%, 100% 0%, 100% 72%, 60% 72%, 50% 100%, 40% 72%, 0% 72%);
      background: #3b82f6;
    }
    .shape-demo.star {
      border-shape: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      background: #f59e0b;
    }

    .card:hover .shape-demo {
      transform: scale(1.1);
      clip-path: polygon(round 20px, 0% 0%, 100% 0%, 100% 100%, 0% 100%);
    }

    .card h2 { margin-bottom: 0.5rem; font-size: 1.4rem; font-weight: 700; color: #fff; }
    .card p { color: var(--text-muted); font-size: 1rem; line-height: 1.5; font-weight: 400; margin: 0; }

    /* --- Element-scoped View Transitions --- */
    #detail-view {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 200;
      display: none;
      padding: 2rem;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #detail-view.active {
      display: flex;
    }

    .detail-card {
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 1rem;
      max-width: 600px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    
    .detail-card.vt-active {
      view-transition-name: active-card;
    }

    .detail-card h2 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; font-weight: 800; }
    .detail-card p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6; }
    
    .back-btn {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.3s;
    }
    .back-btn:hover { background: var(--accent-hover); }

    ::view-transition-old(active-card),
    ::view-transition-new(active-card) {
      animation-duration: 0.4s;
      animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card.selected {
      view-transition-name: active-card;
    }
  </style>
</head>
<body>

  <header id="main-header">
    <h1>CSS Superpowers Showcase</h1>
    <p>Scroll down for <code>@scroll-state</code>, hover cards for <code>polygon(round)</code>, click for <strong>View Transitions</strong>.</p>
  </header>

  <main id="gallery"></main>

  <div id="detail-view">
    <div class="detail-card" id="detail-card">
      <div class="shape-demo" id="detail-shape"></div>
      <h2 id="detail-title">Title</h2>
      <p id="detail-desc">Description</p>
      <button class="back-btn" onclick="closeDetail()">Back to Gallery</button>
    </div>
  </div>

  <script>
    const items = [
      { id: 1, title: 'Hexagon Card', desc: 'The shape above is built using a single div with CSS border-shape: polygon(...).', shapeClass: 'hexagon' },
      { id: 2, title: 'Speech Bubble', desc: 'No SVG here! Just a standard CSS border-shape declaration. Hover the card to see the clip-path morph.', shapeClass: 'speech-bubble' },
      { id: 3, title: 'Star Power', desc: 'A 10-point star shape rendered completely in CSS. Click on me to trigger an Element-scoped View Transition!', shapeClass: 'star' },
      { id: 4, title: 'Animated Clip Path', desc: 'Hover me. The clip-path transitions smoothly to polygon(round 20px) thanks to rounding support.', shapeClass: 'hexagon' },
      { id: 5, title: '@scroll-state', desc: 'Scroll up and down. Notice how the header at the top changes style automatically using @container scroll-state(scrolled: top).', shapeClass: 'speech-bubble' },
      { id: 6, title: 'Concurrent VT', desc: 'When you click a card, the view-transition-name is dynamically applied, causing the card to smoothly expand!', shapeClass: 'star' }
    ];

    const gallery = document.getElementById('gallery');
    let selectedCard = null;

    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<div class="shape-demo ${item.shapeClass}"></div><h2>${item.title}</h2><p>${item.desc}</p>`;
      el.onclick = () => openDetail(el, item);
      gallery.appendChild(el);
    });

    const detailCard = document.getElementById('detail-card');
    const detailShape = document.getElementById('detail-shape');

    function openDetail(element, item) {
      if (!document.startViewTransition) return showDetail(item);
      
      element.classList.add('selected');
      detailCard.classList.remove('vt-active'); // Ensure target doesn't have it yet
      
      const t = document.startViewTransition(() => {
        element.classList.remove('selected');
        detailCard.classList.add('vt-active');
        
        detailShape.className = `shape-demo ${item.shapeClass}`;
        document.getElementById('detail-title').textContent = item.title;
        document.getElementById('detail-desc').textContent = item.desc;
        document.getElementById('detail-view').classList.add('active');
      });
      t.finished.then(() => {
        selectedCard = element;
      });
    }

    function closeDetail() {
      if (!document.startViewTransition) return hideDetail();

      if (selectedCard) {
        detailCard.classList.add('vt-active');
      }

      const t = document.startViewTransition(() => {
        detailCard.classList.remove('vt-active');
        if (selectedCard) selectedCard.classList.add('selected');
        document.getElementById('detail-view').classList.remove('active');
      });

      t.finished.then(() => {
        if (selectedCard) {
          selectedCard.classList.remove('selected');
          selectedCard = null;
        }
      });
    }

    function showDetail(item) {
      detailShape.className = `shape-demo ${item.shapeClass}`;
      document.getElementById('detail-title').textContent = item.title;
      document.getElementById('detail-desc').textContent = item.desc;
      document.getElementById('detail-view').classList.add('active');
    }

    function hideDetail() {
      document.getElementById('detail-view').classList.remove('active');
    }
  </script>
</body>
</html>
