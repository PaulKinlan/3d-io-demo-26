<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c1118;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="message">Woohoo! 🎉</div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particles = [];
        const fireworks = [];
        const colors = ['#ff0044', '#00ff44', '#4400ff', '#ffeb3b', '#00bcd4', '#ff8800', '#ee00ff'];

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        class Confetti {
            constructor() {
                this.x = random(0, width);
                this.y = random(-height, 0);
                this.size = random(8, 14);
                this.speedY = random(2, 6);
                this.speedX = random(-3, 3);
                this.color = colors[Math.floor(random(0, colors.length))];
                this.rotation = random(0, 360);
                this.rotationSpeed = random(-10, 10);
                this.type = Math.random() > 0.5 ? 'rect' : 'circle';
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                if (this.y > height) {
                    this.y = random(-height, 0);
                    this.x = random(0, width);
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                if (this.type === 'rect') {
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        class Firework {
            constructor() {
                this.x = random(width * 0.1, width * 0.9);
                this.y = height;
                this.targetY = random(height * 0.1, height * 0.4);
                this.speedY = random(10, 18);
                this.color = colors[Math.floor(random(0, colors.length))];
                this.exploded = false;
            }
            update() {
                if (!this.exploded) {
                    this.y -= this.speedY;
                    if (this.y <= this.targetY) {
                        this.exploded = true;
                        for (let i = 0; i < 80; i++) {
                            particles.push(new Particle(this.x, this.y, this.color));
                        }
                    }
                }
            }
            draw() {
                if (!this.exploded) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = random(0, Math.PI * 2);
                const speed = random(1, 12);
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.life = random(40, 100);
                this.maxLife = this.life;
                this.decay = random(0.8, 1.2);
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.15; // gravity
                this.speedX *= 0.98; // friction
                this.speedY *= 0.98; // friction
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const confetti = Array.from({length: 150}, () => new Confetti());

        let frameCount = 0;
        function loop() {
            ctx.fillStyle = 'rgba(12, 17, 24, 0.2)';
            ctx.fillRect(0, 0, width, height);

            if (Math.random() < 0.04) {
                fireworks.push(new Firework());
            }

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].exploded) {
                    fireworks.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            for (let c of confetti) {
                c.update();
                c.draw();
            }

            frameCount++;
            if (frameCount % 2 === 0 && window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'frame' }, '*');
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
