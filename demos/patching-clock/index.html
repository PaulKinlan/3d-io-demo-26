<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patching Clock Demo</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: #0c1118;
      color: #e8f6ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      color: #89ffd8;
      margin-bottom: 1rem;
    }
    .clock-container {
      background: rgba(24, 40, 60, 0.5);
      border: 2px solid rgba(125, 255, 210, 0.3);
      border-radius: 12px;
      padding: 2rem;
      font-size: 3rem;
      font-weight: 700;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
    }
    .clock-container section span {
      display: none !important;
    }
    .clock-container section span:last-of-type {
      display: inline !important;
    }
  </style>
</head>
<body>
  <h1>Declarative Patching Clock</h1>
  <div class="clock-container">
    <section>
      <?start name="clock">Clock loading...<?end>
    </section>
  </div>
  <p style="margin-top: 2rem; color: rgba(232, 246, 255, 0.6);">
    Note: This static file will not update automatically. Access this path via the Vite dev server or run <code>node server.js</code> to see the streaming behavior.
  </p>
</body>
</html>
